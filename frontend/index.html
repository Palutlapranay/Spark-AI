<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>SparkAI | Advanced Image Generator</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Load Phosphor Icons -->
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
</head>

<body>
    <div id="toast-container" class="toast-container"></div>
    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

    <div class="layout">
        <!-- Sidebar for History -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="ph ph-clock-counter-clockwise"></i> History</h2>
                <button id="clear-all-btn" class="icon-btn text-danger" title="Clear all history">
                    <i class="ph ph-trash"></i>
                </button>
            </div>
            <div class="history-list" id="history-list">
                <!-- History items injected here -->
                <div class="empty-state" id="history-empty">
                    <i class="ph ph-image"></i>
                    <p>No history yet</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-nav">
                <div class="logo">
                    <i class="ph ph-sparkle text-primary"></i>
                    <h1>Spark<span>AI</span></h1>
                </div>
                <!-- Re-added Theme Toggle -->
                <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
                    <i class="ph ph-sun" id="theme-icon"></i>
                </button>
            </header>

            <div class="generator-area">
                <div class="card grid-layout">
                    <!-- Left: Input & Controls -->
                    <div class="input-section">
                        <h2>Create Magic</h2>
                        <p class="subtitle">Enter a prompt to generate stunning visuals.</p>

                        <div class="textarea-wrapper">
                            <textarea id="prompt-input"
                                placeholder="e.g. A cyberpunk city with glowing neon signs under heavy rain..."></textarea>
                            <div class="textarea-tools">
                                <button id="surprise-btn" class="icon-btn xs" title="Surprise Me (Random Prompt)">
                                    <i class="ph ph-magic-wand"></i>
                                </button>
                                <button id="clear-prompt-btn" class="icon-btn xs" title="Clear prompt">
                                    <i class="ph ph-x"></i>
                                </button>
                                <button id="copy-prompt-btn" class="icon-btn xs" title="Copy prompt">
                                    <i class="ph ph-copy"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Prompt Quality Meter -->
                        <div class="quality-meter" id="quality-meter">
                            <div class="quality-header">
                                <span class="quality-label"><i class="ph ph-chart-bar"></i> Prompt Quality</span>
                                <span class="quality-badge" id="quality-badge">Start typing...</span>
                            </div>
                            <div class="quality-bar-track">
                                <div class="quality-bar-fill" id="quality-bar-fill"></div>
                            </div>
                            <p class="quality-tip" id="quality-tip">Add more detail, colors, styles or mood to improve quality.</p>
                        </div>

                        <!-- Prompt chips -->
                        <div class="prompt-chips">
                            <span><i class="ph ph-puzzle-piece"></i> Add:</span>
                            <button class="chip">Photorealistic</button>
                            <button class="chip">Cinematic</button>
                            <button class="chip">4k Resolution</button>
                            <button class="chip">Cyberpunk</button>
                            <button class="chip">Masterpiece</button>
                        </div>

                        <!-- Specifications panel -->
                        <div class="specs-panel">
                            <div class="spec-group">
                                <label for="style-select"><i class="ph ph-palette"></i> Style</label>
                                <select id="style-select" class="custom-select">
                                    <option value="none">Auto (No Style)</option>
                                    <option value="hyperrealistic, highly detailed, 8k resolution">Hyperrealistic</option>
                                    <option value="anime style, studio ghibli masterpiece">Anime / Studio Ghibli</option>
                                    <option value="cyberpunk style, neon lights, dystopian">Cyberpunk</option>
                                    <option value="cinematic lighting, dramatic, movie poster">Cinematic</option>
                                    <option value="3d render, rich colors, unreal engine 5">3D Render (UE5)</option>
                                    <option value="watercolor painting, vibrant, soft edges">Watercolor</option>
                                    <option value="comic book style, bold outlines, vivid colors">Comic Book</option>
                                </select>
                            </div>

                            <div class="spec-group">
                                <label><i class="ph ph-aspect-ratio"></i> Ratio</label>
                                <div class="ratio-selectors">
                                    <button class="ratio-btn active" data-width="1024" data-height="1024" data-size="1024x1024" title="1:1 Square">
                                        <div class="ratio-box square"></div>
                                    </button>
                                    <button class="ratio-btn" data-width="1920" data-height="1080" data-size="1792x1024" title="16:9 Landscape">
                                        <div class="ratio-box landscape"></div>
                                    </button>
                                    <button class="ratio-btn" data-width="1080" data-height="1920" data-size="1024x1792" title="9:16 Portrait">
                                        <div class="ratio-box portrait"></div>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <button id="generate-btn" class="btn-primary">
                            <i class="ph ph-magic-wand"></i>
                            <span class="btn-text">Generate Image</span>
                            <div class="spinner hidden" id="btn-spinner"></div>
                        </button>
                    </div>

                    <!-- Right: Image Preview -->
                    <div class="preview-section">
                        <div class="preview-container box-shadow empty" id="result-container">
                            <div class="empty-preview" id="empty-preview">
                                <i class="ph ph-image-square"></i>
                                <p>Your image will appear here</p>
                            </div>

                            <img id="generated-image" src="" alt="AI generated" class="hidden">

                            <!-- Loading Overlay -->
                            <div class="loading-overlay hidden" id="loading-overlay">
                                <span class="loader"></span>
                                <p>Synthesizing pixels...</p>
                            </div>
                        </div>

                        <!-- Always-visible action buttons BELOW the image -->
                        <div class="image-actions hidden" id="image-actions">
                            <button id="regenerate-btn" class="btn-secondary">
                                <i class="ph ph-arrows-clockwise"></i> Regenerate
                            </button>
                            <button id="download-btn" class="btn-secondary">
                                <i class="ph ph-download-simple"></i> Download
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- History Floating Action Button -->
    <button id="history-fab" class="fab mobile-only">
        <i class="ph ph-clock-counter-clockwise"></i>
    </button>

    <!-- Fullscreen Image Modal -->
    <div id="image-modal" class="image-modal hidden">
        <button id="close-modal-btn" class="icon-btn close-btn">
            <i class="ph ph-x"></i>
        </button>
        <img id="modal-image" src="" alt="Fullscreen preview">
    </div>

    <script src="script.js"></script>
</body>

</html>
